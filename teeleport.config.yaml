# Install system packages
packages:
  # Codex emits a warning if this is missing (though it still works)
  - bubblewrap
  # Example
  # - git
  # - curl
  # - vim
  # - htop

# Copy config files from your dotfile repo into the container
copies:
  - name: bashrc
    source: .bashrc
    target: ~/.bashrc
    mode: append

  # Example
  # - name: bashrc
  #   source: config/.bashrc
  #   target: ~/.bashrc
  #   mode: replace

  # - name: git-aliases
  #   source: config/.git_aliases
  #   target: ~/.bashrc
  #   mode: append

# Mount remote directories for persistent state (requires FUSE)
mounts:
  ssh:
    host: ssh.bbenetti.ca
    user: root
    port: 20202
  entries:
    - name: claude
      preset: claude
      force_mount: true
      backend: rsync
    - name: codex
      preset: codex
      force_mount: true
      backend: rsync
    - name: copilot
      preset: copilot
      force_mount: true
      backend: rsync
    - name: known_hosts
      preset: known_hosts
      force_mount: true
      backend: rsync

# Install and auto-run an AI CLI tool
ai_cli:
  - tool: claude-code
  - tool: codex
  - tool: copilot
  # startup_prompt: "Do stuffs"
